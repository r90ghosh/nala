<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Nala — Mission Control</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230a0e14'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='14' fill='%2338bdf8'%3EN%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app-shell">

  <aside class="purpose-rail">
    <div class="rail-brand">
      <div class="mark">N</div>
      <div>
        <div class="name">NALA</div>
        <div class="sub">mission control</div>
      </div>
    </div>
    <div class="rail-label">Purposes</div>
    <nav id="purposeNav"></nav>
  </aside>

  <div class="main-col">

    <div class="topbar">
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-tab active" data-mode="monitor">Monitor</button>
        <button class="mode-tab" data-mode="chat">Chat</button>
        <button class="mode-tab" data-mode="memory">Memory</button>
      </div>
      <div class="spacer"></div>
      <div class="chip indoubt-chip" id="indoubtChip">in-doubt: —</div>
      <div class="spend-wrap" id="spendWrap">
        <div class="chip spend-chip" id="spendChip">spend: —</div>
        <div class="spend-dropdown" id="spendDropdown"></div>
      </div>
      <button class="mic-btn" id="micBtn" disabled title="voice arrives with M6">
        🎙<span>&nbsp;push-to-talk</span>
      </button>
    </div>

    <!-- ============ MONITOR ============ -->
    <div class="view active" id="view-monitor">
      <div class="monitor-subtabs">
        <button data-subtab="feed" class="active">Feed</button>
        <button data-subtab="actions">Actions</button>
      </div>
      <div class="monitor-grid mobile-show-feed" id="monitorGrid">

        <div class="col monitor-col-state">
          <div class="panel">
            <div class="panel-head">
              <div class="title">State of my world</div>
              <span class="tag" id="repoTag"></span>
            </div>
            <div class="panel-body" id="repoList"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <div class="title">Watcher health</div>
              <span class="tag" id="watcherTag"></span>
            </div>
            <div class="panel-body" id="watcherList"></div>
          </div>
        </div>

        <div class="col monitor-col-feed">
          <div class="panel hero">
            <div class="panel-head">
              <div class="title">Observability feed</div>
              <div class="feed-controls" id="feedControls">
                <label><input type="checkbox" class="feed-filter" value="signal" checked> signals</label>
                <label><input type="checkbox" class="feed-filter" value="triage" checked> triage</label>
                <label><input type="checkbox" class="feed-filter" value="llm" checked> llm</label>
                <label><input type="checkbox" class="feed-filter" value="tool" checked> tools</label>
                <label><input type="checkbox" class="feed-filter" value="error" checked> errors</label>
                <label><input type="checkbox" id="autoScroll" checked> auto-scroll</label>
              </div>
            </div>
            <div class="panel-body feed" id="feed">
              <div class="feed-empty">no events yet</div>
            </div>
          </div>
        </div>

        <div class="col monitor-col-actions">
          <div class="panel">
            <div class="panel-head">
              <div class="title">Action queue</div>
              <span class="tag" id="queueTag"></span>
            </div>
            <div class="panel-body" id="queueList"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <div class="title">Model router</div>
              <span class="tag">policy</span>
            </div>
            <div class="panel-body" id="routerList"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ============ CHAT ============ -->
    <div class="view" id="view-chat">
      <div class="chat-wrap">
        <div class="chat-thread" id="chatThread">
          <div class="chat-empty">say something — turns go through the same chokepoint as everything else</div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chatInput" placeholder="Type a message…" autocomplete="off" />
          <button id="chatSend">Send</button>
        </div>
      </div>
    </div>

    <!-- ============ MEMORY ============ -->
    <div class="view" id="view-memory">
      <div class="memory-placeholder">
        <div class="ghost-graph">
          <div class="g-edge" style="width:80px;top:80px;left:110px;transform:rotate(-35deg);"></div>
          <div class="g-edge" style="width:70px;top:80px;left:35px;transform:rotate(160deg);"></div>
          <div class="g-edge" style="width:75px;top:80px;left:110px;transform:rotate(35deg);"></div>
          <div class="g-edge" style="width:60px;top:130px;left:20px;transform:rotate(-15deg);"></div>
          <div class="g-node n1"></div>
          <div class="g-node n2"></div>
          <div class="g-node n3"></div>
          <div class="g-node n4"></div>
          <div class="g-node n5"></div>
        </div>
        <div class="memory-msg">Graph memory arrives with M5</div>
      </div>
    </div>

  </div>
</div>

<nav class="mobile-tabbar" id="mobileTabbar">
  <button class="mtab active" data-mobile="feed">Feed</button>
  <button class="mtab" data-mobile="chat">Chat</button>
  <button class="mtab" data-mobile="actions">Actions</button>
</nav>

<script src="/static/app.js"></script>
</body>
</html>
