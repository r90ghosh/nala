<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Nala — Sign in</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%230a0e14'/%3E%3Ctext x='12' y='17' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='14' fill='%2338bdf8'%3EN%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{ --base:#0a0e14; --panel:#0f131b; --hair:#1e2430; --ink:#e5edf5; --mute:#8a97a8; --accent:#38bdf8; --red:#f87171; }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;background:#06080d;font-family:'Inter',system-ui,sans-serif;}
  body{display:flex;align-items:center;justify-content:center;padding:16px;}
  .box{background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:32px;width:100%;max-width:340px;}
  h1{font-size:15px;font-weight:700;color:#fff;margin:0 0 4px;letter-spacing:.02em;}
  .sub{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--mute);margin-bottom:20px;}
  input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--hair);background:#111827;color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:13px;min-height:44px;}
  input:focus{outline:none;border-color:var(--accent);}
  button{width:100%;margin-top:12px;padding:11px;border-radius:8px;border:none;background:var(--accent);color:#06080d;font-weight:700;font-size:13px;cursor:pointer;min-height:44px;}
  button:disabled{opacity:.6;cursor:default;}
  .err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
  <div class="box">
    <h1>NALA</h1>
    <div class="sub">enter access token to continue</div>
    <input type="password" id="tokenInput" placeholder="access token" autocomplete="off" autofocus />
    <button id="signInBtn">Sign in</button>
    <div class="err" id="errMsg"></div>
  </div>
<script>
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function submitToken() {
  const input = document.getElementById('tokenInput');
  const btn = document.getElementById('signInBtn');
  const errEl = document.getElementById('errMsg');
  const token = input.value;
  errEl.textContent = '';
  btn.disabled = true;
  try {
    const resp = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });
    if (resp.ok) {
      window.location.reload();
      return;
    }
    errEl.textContent = 'incorrect token';
  } catch (e) {
    errEl.textContent = 'login request failed — ' + esc(e.message || 'network error');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('signInBtn').addEventListener('click', submitToken);
document.getElementById('tokenInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitToken();
});
</script>
</body>
</html>
